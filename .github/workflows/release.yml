name: Build and Publish Release

on:
  push:
    tags:
      - '*'

concurrency:
  group: ci-${{ github.sha }}
  cancel-in-progress: true

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install npm dependencies
        run: npm ci

      - name: Extract version from tag
        run: |
          $ver = "$env:GITHUB_REF" -replace 'refs/tags/', ''
          echo "RELEASE_VERSION=$ver" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Generate release notes
        shell: pwsh
        run: |
          $currentTag = $env:RELEASE_VERSION
          $prevTag = git tag --sort=-v:refname | Select-String -Pattern "^$currentTag$" -NotMatch | Select-Object -First 1
          $range = if (-not $prevTag) { $currentTag } else { "$prevTag...$currentTag" }
          & .github/scripts/gen_release_notes.ps1 -r "$range" -o release.md

      - name: Build Tauri app
        run: npm run tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Create Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          prerelease: ${{ contains(env.RELEASE_VERSION, '-') }}
          draft: false
          generate_release_notes: false
          body_path: release.md
          files: |
            src-tauri/target/release/bundle/nsis/*.exe
